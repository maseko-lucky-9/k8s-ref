apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-ref-demo
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: k8s-ref
spec:
  project: default
  source:
    repoURL: https://github.com/maseko-lucky-9/k8s-ref
    targetRevision: HEAD
    path: helm/charts/k8s-ref-demo
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-ref-demo
  # ESO writes status + conditions back to ExternalSecret after reconcile.
  # Ignore all fields managed by the external-secrets controller plus the
  # force-sync annotation. managedFieldsManagers covers whatever ESO adds
  # regardless of path, so this is robust against ESO version changes.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      managedFieldsManagers:
        - external-secrets
      jsonPointers:
        - /status
        - /metadata/annotations/force-sync
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
