apiVersion: argoproj.io/v1alpha1
kind: Application
# Companion bootstrap to vault-k8s-ref-demo (see argocd/apps/vault.yaml).
# Seeds policy + role + KV data into the namespace-isolated demo Vault only.
# Will NOT touch the production Vault at namespace `vault`.
metadata:
  name: vault-k8s-ref-demo-bootstrap
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: k8s-ref
  annotations:
    # Runs after vault-k8s-ref-demo Application (wave 0) finishes its first sync.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/maseko-lucky-9/k8s-ref
    targetRevision: HEAD
    path: helm/charts/vault-bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-k8s-ref-demo
  # The Job's status fields drift each run — ignore them so ArgoCD doesn't
  # flap to OutOfSync between hook executions.
  ignoreDifferences:
    - group: batch
      kind: Job
      jsonPointers:
        - /status
        - /spec/template/metadata
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
