apiVersion: argoproj.io/v1alpha1
kind: Application
# Namespace-isolated demo Vault for the k8s-ref portfolio M2 milestone.
# DO NOT rename to `vault` — the homelab runs a production Vault at namespace
# `vault` with 12 ExternalSecret consumers across affiliate-yt/n8n-live/
# observability/prod. See ADR-0004 § Namespace isolation for rationale.
metadata:
  name: vault-k8s-ref-demo
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: k8s-ref
  annotations:
    # Wave 0 — Vault must be Running before vault-k8s-ref-demo-bootstrap (wave 1) configures it.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.30.0
    helm:
      # Pin release name to `vault` so resource names stay short (Service
      # `vault`, StatefulSet `vault`, pod `vault-0`). Without this the
      # release name defaults to the ArgoCD Application name and Services
      # become `vault-k8s-ref-demo*`, which breaks the bootstrap Job's
      # hardcoded VAULT_ADDR and the ClusterSecretStore server URL.
      # Namespace isolation (destination.namespace below) is the actual
      # collision-avoidance mechanism — service-name isolation isn't needed.
      releaseName: vault
      valuesObject:
        # Dev mode: single in-memory unsealed Vault. NOT production — ADR-0004 documents posture.
        server:
          dev:
            enabled: true
            devRootToken: "root"
          standalone:
            enabled: false
          ha:
            enabled: false
          dataStorage:
            enabled: false
          # Surface a stable service for ESO + bootstrap to reach.
          service:
            enabled: true
        injector:
          # The Vault Agent Injector is not used by this demo (ESO is the consumer).
          enabled: false
        ui:
          enabled: true
          serviceType: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-k8s-ref-demo
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
