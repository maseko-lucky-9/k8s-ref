# yaml-language-server: $schema=values.schema.json

namespace: k8s-ref-demo

clusterIssuer: homelab-ca
ingressClass: public

tenants:
  - name: tenant-a
    host: k8s-ref-a.homelab.local
    publicHost: k8s-ref-a.prudentiadigital.co.za
    replicas: 2
    message: "Tenant A — K8s reference demo"
    color: "4B8BBE"
  - name: tenant-b
    host: k8s-ref-b.homelab.local
    publicHost: k8s-ref-b.prudentiadigital.co.za
    replicas: 1
    message: "Tenant B — K8s reference demo"
    color: "7C3AED"

image:
  repository: stefanprodan/podinfo
  tag: "6.7.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

eso:
  enabled: true
  serviceAccountName: eso-reader
  # Set true to switch ExternalSecret from the in-cluster kubernetes provider
  # to the Vault-backed ClusterSecretStore. Requires the `vault` and
  # `vault-bootstrap` Applications synced first (see argocd/apps/vault*.yaml).
  # Migration is gradual — both stores can coexist while flipping; remove
  # cluster-secret-store.yaml in a follow-up commit after verifying.
  useVault: false
  vault:
    # In-cluster *demo* Vault service URL (set by argocd/apps/vault.yaml deploy).
    # Service name = Helm release name of upstream hashicorp/vault chart, which
    # defaults to the ArgoCD Application name (vault-k8s-ref-demo). Namespace-
    # isolated from the homelab's production Vault — see ADR-0004 § Namespace
    # isolation. Production Vault stays at vault.vault.svc.cluster.local:8200.
    server: "http://vault-k8s-ref-demo.vault-k8s-ref-demo.svc.cluster.local:8200"
    # KV-v2 mount Vault dev-mode enables by default.
    kvMount: "secret"
    kvVersion: "v2"
    # Vault role name created by helm/charts/vault-bootstrap.
    role: "k8s-ref-demo"

# Cloudflare Tunnel — disabled until tunnel credentials secret is provisioned.
# To enable:
#   1. Create tunnel: cloudflared tunnel create k8s-ref (via Cloudflare Zero Trust dashboard or CLI)
#   2. kubectl create secret generic cloudflared-tunnel-creds \
#        --from-file=credentials.json=<path-to-creds.json> -n k8s-ref-demo
#   3. Set cloudflared.enabled=true and cloudflared.tunnelId=<uuid> in ArgoCD app values
cloudflared:
  enabled: false
  tunnelId: ""
  imageTag: "2025.4.0"
  credentialsSecret: cloudflared-tunnel-creds
