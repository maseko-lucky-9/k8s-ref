# yaml-language-server: $schema=values.schema.json

namespace: k8s-ref-demo

clusterIssuer: homelab-ca
ingressClass: public

tenants:
  - name: tenant-a
    host: k8s-ref-a.homelab.local
    publicHost: k8s-ref-a.prudentiadigital.co.za
    replicas: 2
    message: "Tenant A — K8s reference demo"
    color: "4B8BBE"
    # M3 (ADR-0006): manage tenant-a via Argo Rollouts canary instead of
    # a plain Deployment. Stable + canary share the tenant-a Service via
    # `app: tenant-a` label; replica-count canary, not service-mesh.
    rollout: true
  - name: tenant-b
    host: k8s-ref-b.homelab.local
    publicHost: k8s-ref-b.prudentiadigital.co.za
    replicas: 1
    message: "Tenant B — K8s reference demo"
    color: "7C3AED"
    # tenant-b stays as a plain Deployment on purpose — demonstrates the
    # side-by-side migration story (some workloads canary, others don't).

image:
  repository: stefanprodan/podinfo
  tag: "6.7.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

eso:
  enabled: true
  serviceAccountName: eso-reader
  # Set true to switch ExternalSecret from the in-cluster kubernetes provider
  # to the Vault-backed ClusterSecretStore. Requires the `vault` and
  # `vault-bootstrap` Applications synced first (see argocd/apps/vault*.yaml).
  # Migration is gradual — both stores can coexist while flipping; remove
  # cluster-secret-store.yaml in a follow-up commit after verifying.
  useVault: true   # M2 cutover 2026-05-18 — see ADR-0004
  vault:
    # In-cluster *demo* Vault service URL (set by argocd/apps/vault.yaml deploy).
    # Service name = Helm release name of upstream hashicorp/vault chart, which
    # defaults to the ArgoCD Application name (vault-k8s-ref-demo). Namespace-
    # isolated from the homelab's production Vault — see ADR-0004 § Namespace
    # isolation. Production Vault stays at vault.vault.svc.cluster.local:8200.
    server: "http://vault-k8s-ref-demo.vault-k8s-ref-demo.svc.cluster.local:8200"
    # KV-v2 mount Vault dev-mode enables by default.
    kvMount: "secret"
    kvVersion: "v2"
    # Vault role name created by helm/charts/vault-bootstrap.
    role: "k8s-ref-demo"

# Cloudflare Tunnel — enabled 2026-05-18 (M1 W3, see ClickUp 869d6ph0v).
# Routes tenant Services through a zero-trust outbound tunnel; no firewall
# ports opened on the homelab. ArgoCD/Grafana/Vault UIs are deliberately NOT
# in the tunnel ingress map (see helm/charts/k8s-ref-demo/templates/cloudflared/configmap.yaml).
#
# To rotate the tunnel (e.g., after compromise):
#   1. cloudflared tunnel delete <uuid> + create fresh
#   2. kubectl create secret generic cloudflared-tunnel-creds \
#        --from-file=credentials.json=<path-to-creds.json> -n k8s-ref-demo \
#        --dry-run=client -o yaml | kubectl apply -f -
#   3. Update cloudflared.tunnelId below and ArgoCD sync
#   4. cloudflared tunnel route dns <new-uuid> <hostname>  # per tenant
cloudflared:
  enabled: true
  tunnelId: "f2fbd78e-a9ed-48b1-b361-93361e440df4"
  imageTag: "2026.5.0"
  credentialsSecret: cloudflared-tunnel-creds
