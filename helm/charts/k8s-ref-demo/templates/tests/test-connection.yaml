{{- range .Values.tenants }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "test-{{ .name }}-connection"
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "k8s-ref-demo.labels" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.9.1
      command: ["curl", "-sf", "http://{{ .name }}/readyz"]
{{- end }}
