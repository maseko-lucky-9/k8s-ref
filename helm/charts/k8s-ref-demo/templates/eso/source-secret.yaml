{{- if .Values.eso.enabled }}
# Simulates a secret written by an admin/platform team or secret manager.
# In production: populated by Vault, AWS Secrets Manager, or SRE tooling.
# ESO reads this and creates the managed 'tenant-config' Secret with ownership semantics.
apiVersion: v1
kind: Secret
metadata:
  name: eso-source-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-ref-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: eso-source
type: Opaque
stringData:
  app-env: "production"
  feature-flags: "dark-mode=true,analytics=false"
  log-level: "info"
{{- end }}
