{{- if .Values.eso.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.eso.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-ref-demo.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ref-demo-eso-reader
  labels:
    {{- include "k8s-ref-demo.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ref-demo-eso-reader
  labels:
    {{- include "k8s-ref-demo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-ref-demo-eso-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.eso.serviceAccountName }}
    namespace: {{ .Values.namespace }}
{{- end }}
