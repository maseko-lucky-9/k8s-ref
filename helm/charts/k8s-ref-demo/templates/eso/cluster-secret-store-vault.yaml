{{- if and .Values.eso.enabled .Values.eso.useVault }}
# Vault-backed ClusterSecretStore — Slice 4 / M2 of the k8s-ref portfolio.
# Pair with the kubernetes-backed store (gated behind useVault==false) for safe migration:
#   1. Deploy this store alongside the existing one (toggle .Values.eso.useVault=true)
#   2. Flip ExternalSecret.spec.secretStoreRef.name to k8s-ref-demo-vault-store
#   3. Verify ExternalSecret status Ready=True
#   4. Remove the kubernetes-backed store in a follow-up commit
#
# ADR-0003 promise: ExternalSecret spec is identical regardless of backend.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: k8s-ref-demo-vault-store
  labels:
    {{- include "k8s-ref-demo.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.eso.vault.server | quote }}
      path: {{ .Values.eso.vault.kvMount | quote }}
      version: {{ .Values.eso.vault.kvVersion | quote }}
      auth:
        kubernetes:
          mountPath: kubernetes
          role: {{ .Values.eso.vault.role | quote }}
          serviceAccountRef:
            name: {{ .Values.eso.serviceAccountName }}
            namespace: {{ .Values.namespace }}
{{- end }}
