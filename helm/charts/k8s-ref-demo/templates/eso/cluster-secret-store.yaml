{{- if .Values.eso.enabled }}
# Cluster-scoped store: ESO reads from the dedicated source namespace.
# Any namespace can reference this store — enforces source-of-truth isolation.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: k8s-ref-demo-store
  labels:
    {{- include "k8s-ref-demo.labels" . | nindent 4 }}
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Values.namespace }}
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: {{ .Values.namespace }}
      auth:
        serviceAccount:
          name: {{ .Values.eso.serviceAccountName }}
          namespace: {{ .Values.namespace }}
{{- end }}
