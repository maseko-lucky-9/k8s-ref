{{- if .Values.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tenant-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-ref-demo.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    # Backend swap is the only thing that changes during the Vault migration.
    # ExternalSecret spec stays identical — ADR-0003's main demo claim.
    name: {{ if .Values.eso.useVault -}}k8s-ref-demo-vault-store{{- else -}}k8s-ref-demo-store{{- end }}
    kind: ClusterSecretStore
  target:
    name: tenant-config
    creationPolicy: Owner
  data:
    - secretKey: app-env
      remoteRef:
        key: eso-source-config
        property: app-env
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: feature-flags
      remoteRef:
        key: eso-source-config
        property: feature-flags
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: log-level
      remoteRef:
        key: eso-source-config
        property: log-level
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
