# SA the init Job runs as. Needs to create/read the keys Secret.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init
  namespace: {{ .Values.vaultNamespace }}
  labels:
    {{- include "vault-init.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-init
  namespace: {{ .Values.vaultNamespace }}
  labels:
    {{- include "vault-init.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    # Job needs `get` to check if the Secret already exists, `create` to
    # write the keys on first init, `patch` to update if regenerated.
    verbs: ["get", "create", "patch", "update"]
    resourceNames: ["{{ .Values.keysSecret }}"]
  - apiGroups: [""]
    resources: ["secrets"]
    # `create` cannot use resourceNames — must allow on the full resource.
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-init
  namespace: {{ .Values.vaultNamespace }}
  labels:
    {{- include "vault-init.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-init
subjects:
  - kind: ServiceAccount
    name: vault-init
    namespace: {{ .Values.vaultNamespace }}
