# ServiceAccount the bootstrap Job runs as. Vault Kubernetes auth uses a
# TokenReview by the apiserver — the bootstrap SA needs the system:auth-delegator
# ClusterRole so Vault's TokenReview calls succeed once configured.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap
  namespace: {{ .Values.vaultNamespace }}
  labels:
    {{- include "vault-bootstrap.labels" . | nindent 4 }}
---
# Long-lived (non-expiring) SA token for `token_reviewer_jwt`. Vault stores
# this once via `vault write auth/kubernetes/config` and re-uses it on every
# incoming login. The pod's projected SA token (rotated by the kubelet on a
# ~1h cadence) becomes invalid before Vault can refresh, causing ESO logins
# to return 403 ~1h after bootstrap. A Secret of type
# `kubernetes.io/service-account-token` is the only K8s-native primitive that
# yields a token Vault can hold indefinitely.
apiVersion: v1
kind: Secret
metadata:
  name: vault-bootstrap-token
  namespace: {{ .Values.vaultNamespace }}
  annotations:
    kubernetes.io/service-account.name: vault-bootstrap
  labels:
    {{- include "vault-bootstrap.labels" . | nindent 4 }}
type: kubernetes.io/service-account-token
---
# Bind system:auth-delegator so Vault's k8s auth method can validate the
# bootstrap SA's own token when probing the apiserver.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  # Project-scoped binding name to avoid cluster-scope collision with any
  # other Vault bootstrap charts running in the homelab.
  name: vault-k8s-ref-demo-bootstrap-token-reviewer
  labels:
    {{- include "vault-bootstrap.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap
    namespace: {{ .Values.vaultNamespace }}
